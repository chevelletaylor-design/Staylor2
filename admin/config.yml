# Decap CMS config — matches config.json structure for v4 Sophia site

backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

publish_mode: editorial_workflow

collections:
  - name: "content"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:
      - name: "site"
        label: "🌸  Edit Site Content"
        file: "config.json"
        fields:

          - label: "📣  Announcement Bar"
            name: "announce"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Show the bar?", name: "show", widget: "boolean", default: true }
              - { label: "Announcement Text", name: "text", widget: "string" }

          - label: "🏷️  Brand & Logo"
            name: "brand"
            widget: "object"
            collapsed: true
            fields:
              - label: "Logo"
                name: "logo"
                widget: "image"
                required: false
                default: "default"
                hint: "Upload a square logo. Leave blank to use the default italic 'S' monogram."
              - { label: "Logo Alt Text", name: "logoAlt", widget: "string" }
              - { label: "Brand Name", name: "name", widget: "string" }
              - { label: "Tagline Under Name", name: "tagline", widget: "string" }
              - { label: "Footer Blurb", name: "footerTagline", widget: "text" }

          - label: "🧭  Navigation Menu"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - label: "Menu Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "Link Target", name: "href", widget: "string" }
              - { label: "CTA Button Text", name: "ctaLabel", widget: "string" }
              - { label: "CTA Button Link", name: "ctaHref", widget: "string" }

          - label: "⭐  Hero Section"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline Line 1", name: "headlineLine1", widget: "string" }
              - { label: "Headline Line 2 (pink italic)", name: "headlineLine2", widget: "string" }
              - { label: "Headline Line 3", name: "headlineLine3", widget: "string" }
              - { label: "Subheadline", name: "subheadline", widget: "text" }
              - { label: "Button Text", name: "ctaLabel", widget: "string" }
              - { label: "Button Link", name: "ctaHref", widget: "string" }
              - { label: "Side Note (italic text next to button)", name: "sideNote", widget: "string" }
              - label: "Process Card (right side of hero)"
                name: "processCard"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - label: "Steps (3 recommended)"
                    name: "steps"
                    widget: "list"
                    fields:
                      - { label: "Step Number (e.g., 01)", name: "num", widget: "string" }
                      - { label: "Step Title", name: "title", widget: "string" }
                      - { label: "Step Description", name: "description", widget: "text" }

          - label: "✨  Trust Bar"
            name: "trustBar"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Show this section?", name: "show", widget: "boolean", default: true }
              - { label: "Label (above grid)", name: "label", widget: "string" }
              - label: "Items (6 recommended)"
                name: "items"
                widget: "list"
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options: ["nonprofit", "business", "cpa", "founder", "church", "consultant"]
                  - { label: "Text", name: "text", widget: "string" }

          - label: "👋  About The Practice"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string", hint: "Wrap emphasized words in <em>...</em>" }
              - label: "Sophia's Photo"
                name: "imageUrl"
                widget: "image"
                required: false
              - { label: "Photo Alt Text", name: "imageAlt", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "text", widget: "text" }
              - { label: "Pull Quote", name: "pullQuote", widget: "text", hint: "Wrap emphasized words in <em>...</em>" }
              - label: "Sophia's Info (shown below photo)"
                name: "owner"
                widget: "object"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Title / Role", name: "title", widget: "string" }

          - label: "🧾  Services Section"
            name: "services"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Lede", name: "lede", widget: "text" }
              - label: "First Service"
                name: "featured"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Bullets (optional)"
                    name: "bullets"
                    widget: "list"
                    required: false
                    field: { label: "Bullet", name: "text", widget: "string" }
              - label: "Additional Services"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Bullets (optional)"
                    name: "bullets"
                    widget: "list"
                    required: false
                    field: { label: "Bullet", name: "text", widget: "string" }

          - label: "⭐  How I Work"
            name: "differentiators"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "The Principles"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Roman Numeral", name: "badge", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "📖  Client Case Study"
            name: "caseStudy"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title Line 1", name: "titleLine1", widget: "string" }
              - { label: "Title Line 2 (italic)", name: "titleLine2", widget: "string" }
              - label: "Case Study Image"
                name: "imageUrl"
                widget: "image"
                required: false
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "text", widget: "text" }
              - { label: "Pull Quote", name: "quote", widget: "text" }
              - label: "Before / After Comparison"
                name: "comparison"
                widget: "object"
                fields:
                  - label: "Row 1 (Time)"
                    name: "row1"
                    widget: "object"
                    fields:
                      - { label: "Before Label", name: "beforeLabel", widget: "string" }
                      - { label: "Before Value", name: "beforeValue", widget: "string" }
                      - { label: "Before Caption", name: "beforeCaption", widget: "string" }
                      - { label: "After Label", name: "afterLabel", widget: "string" }
                      - { label: "After Value", name: "afterValue", widget: "string" }
                      - { label: "After Caption", name: "afterCaption", widget: "string" }
                  - label: "Row 2 (Cost)"
                    name: "row2"
                    widget: "object"
                    fields:
                      - { label: "Before Label", name: "beforeLabel", widget: "string" }
                      - { label: "Before Value", name: "beforeValue", widget: "string" }
                      - { label: "Before Caption", name: "beforeCaption", widget: "string" }
                      - { label: "After Label", name: "afterLabel", widget: "string" }
                      - { label: "After Value", name: "afterValue", widget: "string" }
                      - { label: "After Caption", name: "afterCaption", widget: "string" }

          - label: "💬  Testimonial"
            name: "testimonial"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Show this section?", name: "show", widget: "boolean", default: true }
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Attribution", name: "attribution", widget: "string" }

          - label: "📊  Stats"
            name: "stats"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Show this section?", name: "show", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Stat Blocks"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Big Value", name: "value", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "🎯  Who I Serve"
            name: "audience"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "Audience Items"
                name: "items"
                widget: "list"
                field: { label: "Text", name: "text", widget: "string" }

          - label: "📬  Contact Section"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Italic Note (left side)", name: "scriptNote", widget: "string" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Phone (display)", name: "phone", widget: "string" }
              - { label: "Phone (click-to-call)", name: "phoneHref", widget: "string" }
              - { label: "Submit Button Label", name: "submitLabel", widget: "string" }
              - { label: "Note Below Form", name: "formNote", widget: "string" }
              - label: "Form Provider"
                name: "formProvider"
                widget: "select"
                options: ["demo", "formspree", "netlify", "web3forms", "mailto"]
              - { label: "Form Endpoint URL", name: "formAction", widget: "string" }

          - label: "🦶  Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Services Heading", name: "servicesHeading", widget: "string" }
              - label: "Services Links"
                name: "servicesLinks"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
              - { label: "Contact Heading", name: "contactHeading", widget: "string" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }
              - label: "Designer Credit"
                name: "designerCredit"
                widget: "object"
                fields:
                  - { label: "Tagline (before name)", name: "tagline", widget: "string" }
                  - { label: "Designer Name", name: "brand", widget: "string" }
                  - { label: "Designer URL", name: "url", widget: "string" }
