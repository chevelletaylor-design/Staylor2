# ===========================================================================
# DECAP CMS CONFIG — defines what Sophia can edit in the admin panel
# Edits save directly to config.json, which powers the live site.
# ===========================================================================

backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

# Gives Sophia a draft/preview step before publishing (recommended)
publish_mode: editorial_workflow

collections:
  - name: "content"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:

      # =====================================================================
      # 🌺 Everything in one editable screen (keeps JSON structure intact)
      # =====================================================================
      - name: "site"
        label: "🌺  Edit Site Content"
        file: "config.json"
        fields:

          # --- BRAND ---
          - label: "🏷️  Brand & Logo"
            name: "brand"
            widget: "object"
            collapsed: true
            fields:
              - label: "Logo"
                name: "logo"
                widget: "image"
                required: false
                default: "default"
                hint: "Upload a square logo (SVG or PNG). Leave blank to use the default hibiscus design."
              - { label: "Logo Alt Text (for screen readers)", name: "logoAlt", widget: "string" }
              - { label: "Brand Name", name: "name", widget: "string", hint: "Big script text in the header" }
              - { label: "Tagline Under Name", name: "tagline", widget: "string", hint: "Small uppercase text — e.g. 'BOOKKEEPING'" }
              - { label: "Footer Blurb", name: "footerTagline", widget: "text", hint: "Short paragraph shown next to the logo in the footer" }

          # --- NAVIGATION ---
          - label: "🧭  Navigation Menu"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - label: "Menu Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "Link Target", name: "href", widget: "string", hint: "#services, #approach, etc." }
              - { label: "CTA Button Text", name: "ctaLabel", widget: "string" }
              - { label: "CTA Button Link", name: "ctaHref", widget: "string" }

          # --- HERO ---
          - label: "⭐  Hero Section (top of page)"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow (small tag above headline)", name: "eyebrow", widget: "string" }
              - { label: "Headline Line 1", name: "headlineLine1", widget: "string", hint: "Shown in dark green serif" }
              - { label: "Headline Line 2 (script accent)", name: "headlineLine2", widget: "string", hint: "Shown in orange handwritten script" }
              - { label: "Headline Line 3", name: "headlineLine3", widget: "string", hint: "Shown in dark green serif" }
              - { label: "Subheadline Paragraph", name: "subheadline", widget: "text" }
              - { label: "Button Text", name: "ctaLabel", widget: "string" }
              - { label: "Button Link", name: "ctaHref", widget: "string" }
              - { label: "Handwritten Note Next To Button", name: "sideNote", widget: "string", hint: "E.g. 'takes 2 mins!'" }
              - label: "Hero Visual Card"
                name: "card"
                widget: "object"
                fields:
                  - { label: "Small Label", name: "eyebrow", widget: "string" }
                  - { label: "Big Text (top)", name: "bigTextLine1", widget: "string" }
                  - { label: "Script Text (middle)", name: "bigTextLine2", widget: "string" }
                  - { label: "Caption (bottom)", name: "caption", widget: "string" }

          # --- MARQUEE ---
          - label: "🎢  Scrolling Marquee"
            name: "marquee"
            widget: "list"
            collapsed: true
            field: { label: "Marquee Text", name: "text", widget: "string" }
            hint: "These phrases scroll across the green banner. Add, remove, or reorder as you like."

          # --- ABOUT ---
          - label: "👋  About The Practice"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string", hint: "Wrap script words in <em>...</em>" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "text", widget: "text" }
              - { label: "Pull Quote", name: "pullQuote", widget: "text", hint: "Wrap script words in <em>...</em>" }
              - label: "Owner Profile (Sophia)"
                name: "owner"
                widget: "object"
                fields:
                  - label: "Owner Photo"
                    name: "photo"
                    widget: "image"
                    required: false
                    hint: "Portrait orientation works best, 600×750px or larger"
                  - { label: "Photo Alt Text", name: "photoAlt", widget: "string" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Title / Role", name: "title", widget: "string" }
                  - { label: "Quote from Owner", name: "quote", widget: "text" }

          # --- SERVICES ---
          - label: "🧾  Services Section"
            name: "services"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string", hint: "Wrap script words in <em>...</em>" }
              - { label: "Lede (intro paragraph)", name: "lede", widget: "text" }
              - label: "Flagship / Featured Service (big card)"
                name: "featured"
                widget: "object"
                fields:
                  - { label: "Small Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string", hint: "Wrap script words in <em>...</em>" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Bullet Points"
                    name: "bullets"
                    widget: "list"
                    field: { label: "Bullet", name: "text", widget: "string" }
              - label: "Additional Services (smaller cards)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Small Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Bullet Points (optional)"
                    name: "bullets"
                    widget: "list"
                    required: false
                    field: { label: "Bullet", name: "text", widget: "string" }

          # --- DIFFERENTIATORS ---
          - label: "✨  What Sets Us Apart"
            name: "differentiators"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "The 4 Principles"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Badge (roman numeral)", name: "badge", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          # --- CASE STUDY ---
          - label: "📖  Client Case Study"
            name: "caseStudy"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title Line 1", name: "titleLine1", widget: "string" }
              - { label: "Title Line 2 (script)", name: "titleLine2", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "text", widget: "text" }
                hint: "Wrap bolded words in <strong>...</strong>"
              - { label: "Pull Quote", name: "quote", widget: "text" }
              - label: "Before / After Comparison"
                name: "comparison"
                widget: "object"
                fields:
                  - label: "Row 1 (Time)"
                    name: "row1"
                    widget: "object"
                    fields:
                      - { label: "Before Label", name: "beforeLabel", widget: "string" }
                      - { label: "Before Value", name: "beforeValue", widget: "string" }
                      - { label: "Before Caption", name: "beforeCaption", widget: "string" }
                      - { label: "After Label", name: "afterLabel", widget: "string" }
                      - { label: "After Value", name: "afterValue", widget: "string" }
                      - { label: "After Caption", name: "afterCaption", widget: "string" }
                  - label: "Row 2 (Cost)"
                    name: "row2"
                    widget: "object"
                    fields:
                      - { label: "Before Label", name: "beforeLabel", widget: "string" }
                      - { label: "Before Value", name: "beforeValue", widget: "string" }
                      - { label: "Before Caption", name: "beforeCaption", widget: "string" }
                      - { label: "After Label", name: "afterLabel", widget: "string" }
                      - { label: "After Value", name: "afterValue", widget: "string" }
                      - { label: "After Caption", name: "afterCaption", widget: "string" }
                  - { label: "Result Prefix", name: "resultPrefix", widget: "string" }
                  - { label: "Result Script Text", name: "resultScript", widget: "string" }
                  - { label: "Result Suffix", name: "resultSuffix", widget: "string" }

          # --- AUDIENCE ---
          - label: "🎯  Who We Serve"
            name: "audience"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "Audience Tiles"
                name: "items"
                widget: "list"
                field: { label: "Tile Text", name: "text", widget: "string" }

          # --- CONTACT ---
          - label: "📬  Contact Section & Form"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Script Note", name: "scriptNote", widget: "string" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Phone Number (display)", name: "phone", widget: "string" }
              - { label: "Phone Number (digits only for click-to-call)", name: "phoneHref", widget: "string", hint: "E.g. +19175435276" }
              - { label: "Form Badge", name: "formBadge", widget: "string" }
              - { label: "Submit Button Label", name: "submitLabel", widget: "string" }
              - { label: "Note Below Form", name: "formNote", widget: "string" }
              - label: "Form Provider"
                name: "formProvider"
                widget: "select"
                options: ["demo", "formspree", "netlify", "web3forms", "mailto"]
                hint: "Use 'demo' for testing. Change to 'formspree' when you've added your endpoint below."
              - { label: "Form Endpoint URL", name: "formAction", widget: "string", hint: "Paste your Formspree endpoint here" }

          # --- FOOTER ---
          - label: "🦶  Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Services Heading", name: "servicesHeading", widget: "string" }
              - label: "Services Links"
                name: "servicesLinks"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
              - { label: "Contact Heading", name: "contactHeading", widget: "string" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }
              - label: "Designer Credit"
                name: "designerCredit"
                widget: "object"
                fields:
                  - { label: "Tagline (before designer name)", name: "tagline", widget: "string" }
                  - { label: "Designer / Brand Name", name: "brand", widget: "string" }
                  - { label: "Designer Website URL", name: "url", widget: "string" }
